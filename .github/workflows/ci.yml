name: CI

# ───────────────────────────────────────────────────────────
# CI workflow — runs lint, type-check, test, and build on
# push and PR. Catches what AI-assisted changes might miss.
# Supports matrix builds across multiple frameworks.
# ───────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Detect what's in the repo ──────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      has-node: ${{ steps.detect.outputs.has-node }}
      has-python: ${{ steps.detect.outputs.has-python }}
      has-go: ${{ steps.detect.outputs.has-go }}
      has-rust: ${{ steps.detect.outputs.has-rust }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          echo "has-node=$(test -f package.json && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-python=$(test -f pyproject.toml -o -f setup.py -o -f setup.cfg && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-go=$(test -f go.mod && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-rust=$(test -f Cargo.toml && echo true || echo false)" >> $GITHUB_OUTPUT

  # ── Node.js / Next.js ──────────────────────────────────
  node:
    needs: detect
    if: needs.detect.outputs.has-node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present
      - run: npx tsc --noEmit --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

  # ── Python ─────────────────────────────────────────────
  python:
    needs: detect
    if: needs.detect.outputs.has-python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff pytest mypy
      - run: ruff check .
      - run: mypy . --if-present || true
      - run: pytest --if-present

  # ── Go ─────────────────────────────────────────────────
  go:
    needs: detect
    if: needs.detect.outputs.has-go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go test ./... -race
      - run: go build ./...

  # ── Rust ───────────────────────────────────────────────
  rust:
    needs: detect
    if: needs.detect.outputs.has-rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: cargo build --release

  # ── Docs-in-sync check ─────────────────────────────────
  docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check docs were updated alongside code
        run: |
          # Get files changed in this push/PR compared to base
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1)
          CODE_CHANGES=$(echo "$CHANGED" | grep -v '^docs/' | grep -v '^\.github/' | grep -v '\.md$' || true)
          DOC_CHANGES=$(echo "$CHANGED" | grep '^docs/' || true)

          if [ -n "$CODE_CHANGES" ] && [ -z "$DOC_CHANGES" ]; then
            echo "⚠️  Code files changed without doc updates:"
            echo "$CODE_CHANGES"
            echo ""
            echo "Per AGENTS.md, every code change must update docs/."
            echo "Consider updating the relevant doc in docs/."
            # Warning only — doesn't block the build
          else
            echo "✅ Docs check passed."
          fi
