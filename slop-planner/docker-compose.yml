services:
  slop-generator:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: slop-generator
    restart: unless-stopped
    
    # # Resource limits (containers.instructions.md)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '4.0'
    #       memory: 1G
    #     reservations:
    #       cpus: '1.0'
    #       memory: 2G
    
    # Environment variables from .env file (containers.instructions.md)
    env_file:
      - config/.env
    
    # Explicit environment variables for Cline CLI configuration
    environment:
      - CLINE_PROVIDER=${CLINE_PROVIDER:-lmstudio}
      - CLINE_API_BASE_URL=${CLINE_API_BASE_URL:-http://192.168.0.13:1234/v1}
      - CLINE_MODEL=${CLINE_MODEL:-qwen/qwen3.5-9b}
    
    # Volume mounts for workspace persistence
    volumes:
      - ./apps:/app/apps
      - ./db.md:/app/db.md
      - ./config:/app/config:ro
    
    # Health check in compose (requires HEALTHCHECK in Dockerfile)
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    
    # Logging configuration (containers.instructions.md)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    
    # Stop grace period for graceful shutdown
    stop_grace_period: 30s
