# Auto-update the jtmb/jtmb profile README with live GitHub stats.
# Runs every 6 hours and on push to main (when the generator script changes).
name: Update Profile README

on:
  schedule:
    # Every 6 hours (UTC)
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/generate-profile-readme.ts"
      - ".github/workflows/update-profile-readme.yml"
  workflow_dispatch: # Manual trigger

jobs:
  generate:
    name: Generate & Push Profile README
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout dev-whoami
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Generate profile README
        run: npx tsx scripts/generate-profile-readme.ts

      - name: Checkout jtmb/jtmb profile repo
        uses: actions/checkout@v4
        with:
          repository: jtmb/jtmb
          path: profile-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy README to profile repo
        run: |
          cp james-profile.md profile-repo/README.md
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> profile-repo/README.md

      - name: Commit & push profile README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: profile-repo
          commit_message: "⚡ Auto-update profile README [skip ci]"
          branch: main
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
